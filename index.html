<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#102a22">
  <title>Shield GIS Explorer</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root{--ink:#14231e;--muted:#66746d;--line:#dce5df;--green:#1f604b;--dark:#0d281f;--mint:#dff1e8;--paper:#fafbf9;--shadow:0 18px 50px rgba(12,35,27,.17)}
    *{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;color:var(--ink);background:#e8ece8}
    button,input{font:inherit}.app{display:grid;grid-template-columns:360px 1fr;height:100%}
    aside{z-index:1000;display:flex;flex-direction:column;background:var(--paper);border-right:1px solid #ccd7d0;box-shadow:10px 0 35px rgba(14,42,32,.08)}
    header{display:flex;align-items:center;gap:13px;padding:23px 22px;background:var(--dark);color:white}.mark{display:grid;place-items:center;width:43px;height:43px;border:1px solid #78a795;border-radius:13px 13px 13px 3px;background:linear-gradient(145deg,#55a77f,#28604c);font-size:21px;font-weight:800}.eyebrow{margin:0;color:#7e968d;font-size:10px;font-weight:800;letter-spacing:.15em}header .eyebrow{color:#8eb8a8}h1{margin:3px 0 0;font-size:20px;letter-spacing:-.03em}
    .search{position:relative;padding:19px 20px;border-bottom:1px solid var(--line)}label.title{display:block;margin-bottom:8px;color:#526159;font-size:12px;font-weight:700}.searchrow{display:grid;grid-template-columns:1fr 42px;gap:7px}.search input{min-width:0;height:43px;padding:0 12px;border:1px solid #cbd7d0;border-radius:9px;outline:none;background:white}.search input:focus{border-color:#5aa784;box-shadow:0 0 0 3px #5aa78422}.search button{border:0;border-radius:9px;background:var(--green);color:white;font-size:18px;cursor:pointer}.results{position:absolute;z-index:20;top:92px;left:20px;right:20px;overflow:hidden;border:1px solid var(--line);border-radius:9px;background:#fff;box-shadow:var(--shadow)}.result{display:block;width:100%;padding:10px 12px;border:0;border-bottom:1px solid #edf1ee;background:white;text-align:left;cursor:pointer}.result:hover{background:#f0f7f3}.result b,.result small{display:block}.result b{font-size:12px}.result small{margin-top:2px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .section{padding:19px 20px}.heading{display:flex;align-items:end;justify-content:space-between}.heading h2{margin:4px 0 0;font-size:16px}.refresh{padding:3px;border:0;background:none;color:var(--green);font-size:11px;font-weight:800;cursor:pointer}.note{margin:9px 0 14px;color:var(--muted);font-size:11px;line-height:1.45}
    #layers{display:grid;gap:7px}.layer{display:grid;grid-template-columns:18px 1fr auto;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);border-radius:10px;background:white;transition:.15s}.layer:hover{border-color:#b7c9be;transform:translateY(-1px)}.layer.off{opacity:.58}.symbol{width:13px;height:13px;border:2px solid white;border-radius:50%;box-shadow:0 0 0 1px #0003}.symbol.poly{border-radius:3px}.copy b,.copy small{display:block}.copy b{font-size:12px}.copy small{margin-top:2px;color:var(--muted);font-size:10px}.count{min-width:22px;color:#718078;font-size:10px;text-align:right}.toggle{position:relative;width:34px;height:19px}.toggle input{position:absolute;opacity:0}.toggle i{position:absolute;inset:0;border-radius:20px;background:#cad4ce}.toggle i:after{content:"";position:absolute;top:3px;left:3px;width:13px;height:13px;border-radius:50%;background:white;box-shadow:0 1px 3px #0003;transition:.18s}.toggle input:checked+i{background:#51a77d}.toggle input:checked+i:after{transform:translateX(15px)}
    .tempo-tools{margin-top:9px;border:1px solid var(--line);border-radius:10px;background:#fff}.tempo-tools>button{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 11px;border:0;border-radius:10px;background:#f5f8f6;color:var(--green);font-size:11px;font-weight:800;cursor:pointer}.tempo-tools>button span{color:var(--muted);font-size:10px;font-weight:700}.tempo-panel{padding:9px;border-top:1px solid var(--line)}.tempo-actions{display:grid;grid-template-columns:1fr auto auto;gap:5px;margin-bottom:7px}.tempo-actions input{min-width:0;padding:7px 8px;border:1px solid var(--line);border-radius:6px;font-size:10px}.tempo-actions button{padding:6px 8px;border:0;border-radius:6px;background:var(--mint);color:var(--green);font-size:9px;font-weight:800;cursor:pointer}.tempo-list{max-height:220px;overflow:auto;padding-right:3px}.tempo-type{display:grid;grid-template-columns:15px 1fr;gap:7px;align-items:start;padding:6px 3px;border-bottom:1px solid #eef2ef;color:#43534b;font-size:10px;line-height:1.3}.tempo-type:last-child{border-bottom:0}.tempo-type input{margin:1px 0}.tempo-empty{padding:12px;color:var(--muted);font-size:10px;text-align:center}.bottom{margin-top:auto}.base{display:grid;grid-template-columns:repeat(3,1fr);margin-top:9px;padding:3px;border-radius:9px;background:#e7ece8}.base button{padding:7px;border:0;border-radius:7px;background:transparent;color:#69776f;font-size:11px;font-weight:700;cursor:pointer}.base button.on{background:white;color:var(--dark);box-shadow:0 2px 8px #143b2c17}.footer{display:flex;justify-content:space-between;padding:13px 20px 16px;border-top:1px solid var(--line);color:var(--muted);font-size:10px}.dot{display:inline-block;width:7px;height:7px;margin-right:5px;border-radius:50%;background:#42a16e;box-shadow:0 0 0 3px #42a16e22}.dot.busy{background:#d8a839}.dot.bad{background:#d76055}
    main{position:relative;min-width:0}#map{position:absolute;inset:0}.status{position:absolute;z-index:500;left:20px;bottom:25px;display:flex;align-items:center;gap:9px;padding:10px 13px;border:1px solid #ffffff66;border-radius:10px;background:#102c23e8;color:white;box-shadow:var(--shadow);backdrop-filter:blur(10px)}.status b,.status small{display:block}.status b{font-size:11px}.status small{margin-top:2px;color:#a8c4b8;font-size:9px}.status .dot{background:#70d39d}.leaflet-control-zoom{border:0!important;box-shadow:var(--shadow)!important}.leaflet-control-attribution{font-size:9px!important}
    .panel{position:absolute;z-index:600;top:18px;right:18px;width:min(355px,calc(100% - 36px));max-height:calc(100% - 36px);overflow:auto;padding:22px;border:1px solid #173d2f1f;border-radius:14px;background:#fffffffa;box-shadow:var(--shadow)}.panel[hidden]{display:none}.close{position:absolute;top:12px;right:13px;width:28px;height:28px;border:0;border-radius:50%;background:#eef2ef;color:#53635b;font-size:20px;cursor:pointer}.panel h2{margin:6px 35px 10px 0;font-size:20px;line-height:1.25}.tag{display:inline-block;margin:0 4px 5px 0;padding:4px 7px;border-radius:5px;background:var(--mint);color:#245d49;font-size:9px;font-weight:800;text-transform:uppercase}.panel dl{display:grid;grid-template-columns:105px 1fr;gap:8px 11px;margin:14px 0 0;padding-top:14px;border-top:1px solid var(--line);font-size:11px}.panel dt{color:var(--muted)}.panel dd{margin:0;overflow-wrap:anywhere;font-weight:600}.toast{position:absolute;z-index:900;top:18px;left:50%;max-width:420px;padding:10px 13px;transform:translateX(-50%);border-radius:8px;background:#132a22;color:white;box-shadow:var(--shadow);font-size:11px}
    @media(max-width:760px){.app{grid-template-columns:1fr;grid-template-rows:47% 53%}aside{border-right:0;border-bottom:1px solid var(--line)}header{padding:11px 16px}.mark{width:35px;height:35px}.search{padding:10px 15px}.section{padding:12px 15px;overflow:auto}.note,.bottom,.footer{display:none}#layers{grid-template-columns:1fr 1fr}.search .results{top:78px;left:15px;right:15px}}
  </style>
</head>
<body>
<div class="app">
  <aside>
    <header><div class="mark">S</div><div><p class="eyebrow">SHIELD</p><h1>GIS Explorer</h1></div></header>
    <div class="search">
      <label class="title" for="q">Find a place</label>
      <div class="searchrow"><input id="q" placeholder="Address, city, or lat, long"><button id="go" aria-label="Search">⌕</button></div>
      <div class="results" id="results" hidden></div>
    </div>
    <section class="section">
      <div class="heading"><div><p class="eyebrow">LIVE DATA</p><h2>Environmental layers</h2></div><button class="refresh" id="refresh">REFRESH</button></div>
      <p class="note">Zoom into an area to request current records directly from Kentucky GIS services.</p>
      <div id="layers"></div>
      <div class="tempo-tools">
        <button id="tempoFilterButton" type="button">TEMPO categories <span id="tempoSelectionText">Loading…</span></button>
        <div class="tempo-panel" id="tempoFilterPanel" hidden>
          <div class="tempo-actions"><input id="tempoTypeSearch" placeholder="Find a category"><button id="tempoSelectAll" type="button">ALL</button><button id="tempoClearAll" type="button">CLEAR</button></div>
          <div class="tempo-list" id="tempoTypeList"></div>
        </div>
      </div>
    </section>
    <div class="bottom">
      <section class="section"><p class="eyebrow">BASEMAP</p><div class="base"><button class="on" data-base="streets">Streets</button><button data-base="aerial">Aerial</button><button data-base="topo">Topo</button></div></section>
      <div class="footer"><span id="services"><i class="dot"></i>Services ready</span><span>Live public data</span></div>
    </div>
  </aside>
  <main>
    <div id="map"></div>
    <div class="status"><i class="dot"></i><div><b id="visible">0 visible features</b><small id="view">Kentucky overview</small></div></div>
    <section class="panel" id="panel" hidden><button class="close" id="close">×</button><p class="eyebrow" id="kicker">FEATURE DETAILS</p><h2 id="featureTitle"></h2><div id="tags"></div><dl id="fields"></dl></section>
  </main>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
  var configs=[
    {id:"tempo",name:"TEMPO Agency Interests",sub:"Regulated Kentucky locations",color:"#c65a43",shape:"point",min:9,url:"https://watermaps.ky.gov/arcgis/rest/services/WebMapServices/Agency_Interests/MapServer/0",title:"MASTER_AI_NAME",type:"AI_TYPE_DESCRIPTION",fields:["MASTER_AI_ID","AI_TYPE_DESCRIPTION","PHYSICAL_ADDRESS_LINE_1","PHYSICAL_ADDRESS_MUNICIPALITY","PHYSICAL_ADDRESS_ZIP","COUNTY","START_DATE","END_DATE"]},
    {id:"brownfields",name:"Kentucky Brownfields",sub:"Redevelopment program sites",color:"#d39b2f",shape:"polygon",min:7,url:"https://watermaps.ky.gov/arcgis/rest/services/WebMapServices/Brownfields_Superfunds/MapServer/0",title:"NAME",label:"Brownfield",fields:["NAME","SNIPPET","POPUPINFO"]},
    {id:"superfund",name:"Managed Superfund Sites",sub:"Kentucky managed boundaries",color:"#794895",shape:"polygon",min:7,url:"https://watermaps.ky.gov/arcgis/rest/services/WebMapServices/Brownfields_Superfunds/MapServer/1",title:"NAME",label:"Managed Superfund",fields:["NAME","SNIPPET","POPUPINFO"]}
  ];
  var bases={
    streets:L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap contributors"}),
    aerial:L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"&copy; Esri and contributors"}),
    topo:L.tileLayer("https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}",{maxZoom:16,attribution:"USGS The National Map"})
  };
  var map=L.map("map",{center:[37.75,-85.15],zoom:7,preferCanvas:true});
  bases.streets.addTo(map);var currentBase="streets",requestId=0,searchMarker;
  var state={};
  var tempoTypes=[],selectedTempo=new Set(),tempoRefreshTimer;
  configs.forEach(function(c){
    state[c.id]={on:true,count:0,busy:false,error:false,layer:L.geoJSON(null,{
      pointToLayer:function(f,ll){return L.circleMarker(ll,{radius:6,color:"#fff",weight:2,fillColor:c.color,fillOpacity:.94})},
      style:function(){return{color:c.color,weight:2,fillColor:c.color,fillOpacity:.22}},
      onEachFeature:function(f,l){var n=clean(f.properties[c.title])||c.name;l.bindTooltip(n,{sticky:true});l.on("click",function(){show(c,f)})}
    }).addTo(map)}
  });
  function clean(v){return v==null?"":String(v).replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim()}
  function esc(v){return clean(v).replace(/[&<>"']/g,function(x){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[x]})}
  function render(){
    document.getElementById("layers").innerHTML=configs.map(function(c){var s=state[c.id];return '<label class="layer '+(s.on?"":"off")+'"><i class="symbol '+(c.shape==="polygon"?"poly":"")+'" style="background:'+c.color+'"></i><span class="copy"><b>'+c.name+'</b><small>'+(s.busy?"Loading…":s.error?"Unavailable":c.sub)+'</small></span><span class="count">'+(s.count||"")+'</span><span class="toggle"><input type="checkbox" data-layer="'+c.id+'" '+(s.on?"checked":"")+'><i></i></span></label>'}).join("");
    document.querySelectorAll("[data-layer]").forEach(function(x){x.onchange=function(){var s=state[x.dataset.layer];s.on=x.checked;if(s.on){s.layer.addTo(map);load()}else{map.removeLayer(s.layer);s.count=0;render();summary()}}})
  }
  function tempoSqlValue(value){return "'" + value.replace(/'/g,"''") + "'"}
  function tempoWhere(){
    if(!tempoTypes.length||selectedTempo.size===tempoTypes.length)return "1=1";
    if(selectedTempo.size===0)return "1=0";
    var useSelected=selectedTempo.size<=tempoTypes.length/2;
    var values=(useSelected?Array.from(selectedTempo):tempoTypes.filter(function(v){return !selectedTempo.has(v)})).map(tempoSqlValue);
    return "AI_TYPE_DESCRIPTION "+(useSelected?"IN":"NOT IN")+" ("+values.join(",")+")"
  }
  async function loadTempoTypes(){
    try{
      var p=new URLSearchParams({where:"1=1",outFields:"AI_TYPE_DESCRIPTION",returnGeometry:"false",returnDistinctValues:"true",orderByFields:"AI_TYPE_DESCRIPTION",f:"json"});
      var r=await fetch(configs[0].url+"/query?"+p.toString()),data=await r.json();
      tempoTypes=(data.features||[]).map(function(f){return clean(f.attributes.AI_TYPE_DESCRIPTION)}).filter(Boolean);
      tempoTypes.forEach(function(v){selectedTempo.add(v)});renderTempoTypes()
    }catch(e){document.getElementById("tempoSelectionText").textContent="Unavailable"}
  }
  function renderTempoTypes(){
    var query=document.getElementById("tempoTypeSearch").value.trim().toLowerCase();
    var visibleTypes=tempoTypes.filter(function(v){return !query||v.toLowerCase().includes(query)});
    document.getElementById("tempoSelectionText").textContent=selectedTempo.size===tempoTypes.length?"All "+tempoTypes.length:selectedTempo.size+" of "+tempoTypes.length;
    document.getElementById("tempoTypeList").innerHTML=visibleTypes.length?visibleTypes.map(function(v,i){return '<label class="tempo-type"><input type="checkbox" data-tempo-index="'+i+'" '+(selectedTempo.has(v)?"checked":"")+'><span>'+esc(v)+"</span></label>"}).join(""):'<div class="tempo-empty">No matching categories</div>';
    document.querySelectorAll("[data-tempo-index]").forEach(function(box){box.onchange=function(){var v=visibleTypes[Number(box.dataset.tempoIndex)];if(box.checked)selectedTempo.add(v);else selectedTempo.delete(v);document.getElementById("tempoSelectionText").textContent=selectedTempo.size===tempoTypes.length?"All "+tempoTypes.length:selectedTempo.size+" of "+tempoTypes.length;clearTimeout(tempoRefreshTimer);tempoRefreshTimer=setTimeout(load,250)}})
  }
  async function load(){
    var id=++requestId,b=map.getBounds();
    await Promise.allSettled(configs.map(async function(c){
      var s=state[c.id];if(!s.on)return;if(map.getZoom()<c.min){s.layer.clearLayers();s.count=0;s.error=false;render();summary();return}
      s.busy=true;s.error=false;render();serviceStatus();
      try{
        var p=new URLSearchParams({where:c.id==="tempo"?tempoWhere():"1=1",geometry:[b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].join(","),geometryType:"esriGeometryEnvelope",inSR:"4326",spatialRel:"esriSpatialRelIntersects",outFields:"*",returnGeometry:"true",outSR:"4326",resultRecordCount:"2000",f:"geojson"});
        var r=await fetch(c.url+"/query?"+p.toString());if(!r.ok)throw Error("HTTP "+r.status);var data=await r.json();if(data.error)throw Error(data.error.message);
        if(id!==requestId)return;s.layer.clearLayers();s.layer.addData(data);s.count=(data.features||[]).length
      }catch(e){if(id===requestId){s.error=true;s.count=0}}
      finally{if(id===requestId){s.busy=false;render();summary();serviceStatus()}}
    }))
  }
  function serviceStatus(){var active=configs.filter(function(c){return state[c.id].on}),busy=active.some(function(c){return state[c.id].busy}),bad=active.filter(function(c){return state[c.id].error}).length;document.getElementById("services").innerHTML=bad?'<i class="dot bad"></i>'+bad+" service unavailable":busy?'<i class="dot busy"></i>Loading services':'<i class="dot"></i>Services ready'}
  function summary(){var n=configs.reduce(function(a,c){return a+state[c.id].count},0),ctr=map.getCenter();document.getElementById("visible").textContent=n.toLocaleString()+" visible feature"+(n===1?"":"s");document.getElementById("view").textContent=map.getZoom()<9?"Zoom in to load detailed points":ctr.lat.toFixed(3)+", "+ctr.lng.toFixed(3)+" · zoom "+map.getZoom()}
  function show(c,f){var p=f.properties||{},pairs=c.fields.map(function(k){var v=p[k];if(v==null||v==="")return"";if(k.indexOf("DATE")>-1&&!isNaN(Number(v))){v=new Date(Number(v)).toLocaleDateString()}return"<dt>"+esc(k.replaceAll("_"," "))+"</dt><dd>"+esc(v)+"</dd>"}).join("");document.getElementById("kicker").textContent=c.name;document.getElementById("featureTitle").textContent=clean(p[c.title])||c.name;document.getElementById("tags").innerHTML='<span class="tag">'+esc(p[c.type]||c.label||"GIS feature")+"</span>";document.getElementById("fields").innerHTML=pairs;document.getElementById("panel").hidden=false}
  function toast(m){var old=document.querySelector(".toast");if(old)old.remove();var x=document.createElement("div");x.className="toast";x.textContent=m;document.querySelector("main").appendChild(x);setTimeout(function(){x.remove()},4000)}
  document.getElementById("close").onclick=function(){document.getElementById("panel").hidden=true};
  document.getElementById("tempoFilterButton").onclick=function(){var panel=document.getElementById("tempoFilterPanel");panel.hidden=!panel.hidden};
  document.getElementById("tempoTypeSearch").oninput=renderTempoTypes;
  document.getElementById("tempoSelectAll").onclick=function(){tempoTypes.forEach(function(v){selectedTempo.add(v)});renderTempoTypes();load()};
  document.getElementById("tempoClearAll").onclick=function(){selectedTempo.clear();renderTempoTypes();load()};
  document.getElementById("refresh").onclick=load;
  document.querySelectorAll("[data-base]").forEach(function(x){x.onclick=function(){map.removeLayer(bases[currentBase]);currentBase=x.dataset.base;bases[currentBase].addTo(map);bases[currentBase].bringToBack();document.querySelectorAll("[data-base]").forEach(function(y){y.classList.toggle("on",y===x)})}});
  var timer;map.on("moveend",function(){clearTimeout(timer);timer=setTimeout(load,250);summary()});
  async function search(){var q=document.getElementById("q").value.trim();if(!q)return;var m=q.match(/^\s*(-?\d+(?:\.\d+)?)\s*[, ]\s*(-?\d+(?:\.\d+)?)\s*$/);if(m){pick(Number(m[1]),Number(m[2]),q);return}try{var r=await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&limit=5&countrycodes=us&q="+encodeURIComponent(q)),data=await r.json(),box=document.getElementById("results");box.innerHTML=data.length?data.map(function(v,i){return '<button class="result" data-result="'+i+'"><b>'+esc(v.display_name.split(",")[0])+'</b><small>'+esc(v.display_name)+"</small></button>"}).join(""):'<button class="result"><b>No places found</b><small>Try a more specific search.</small></button>';box.hidden=false;box.querySelectorAll("[data-result]").forEach(function(x){x.onclick=function(){var v=data[Number(x.dataset.result)];pick(Number(v.lat),Number(v.lon),v.display_name)}})}catch(e){toast("Search is temporarily unavailable. Try latitude, longitude.")}}
  function pick(lat,lng,label){if(searchMarker)map.removeLayer(searchMarker);searchMarker=L.marker([lat,lng]).addTo(map).bindPopup("<b>"+esc(label)+"</b>").openPopup();map.setView([lat,lng],14);document.getElementById("results").hidden=true}
  document.getElementById("go").onclick=search;document.getElementById("q").onkeydown=function(e){if(e.key==="Enter")search()};
  render();summary();loadTempoTypes();load();
})();
</script>
</body>
</html>

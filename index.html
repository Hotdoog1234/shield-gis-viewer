<body>
<div class="app">
  <aside>
    <header><div class="mark">S</div><div><p class="eyebrow">SHIELD</p><h1>GIS Explorer</h1></div></header>
    <div class="search">
      <label class="title" for="q">Find a place</label>
      <div class="searchrow"><select id="searchType" aria-label="Search type"><option value="auto">Auto</option><option value="ai">AI number</option><option value="name">Name</option><option value="place">Address/place</option><option value="coords">Coordinates</option></select><input id="q" placeholder="Search text"><button id="go" aria-label="Search">⌕</button></div><div class="radiusrow"><label for="radiusSelect">Radius from target</label><select id="radiusSelect"><option value="">Map extent</option><option value="0.25">1/4 mile</option><option value="0.5">1/2 mile</option><option value="0.75">3/4 mile</option><option value="1">1 mile</option></select></div><section class="side-results" id="sideResults" hidden><div class="side-results-head"><div><p class="eyebrow">RADIUS RESULTS</p><h3 id="sideResultsTitle">Found records</h3><small id="sideResultsMeta"></small></div></div><div id="sideResultsList"></div></section>
      <div class="results" id="results" hidden></div>
    </div>
    <section class="section">
      <div class="heading"><div><p class="eyebrow">LIVE DATA</p><h2>Environmental layers</h2></div><button class="refresh" id="refresh">REFRESH</button></div>
      <p class="note">Zoom into an area to request current records directly from Kentucky GIS services.</p>
      <div id="layers"></div>
      <div class="tempo-tools">
        <button id="tempoFilterButton" type="button">TEMPO categories <span id="tempoSelectionText">Loading…</span></button>
        <div class="tempo-panel" id="tempoFilterPanel" hidden>
          <div class="tempo-actions"><input id="tempoTypeSearch" placeholder="Find a category"><button id="tempoSelectAll" type="button">ALL</button><button id="tempoClearAll" type="button">CLEAR</button></div>
          <div class="tempo-list" id="tempoTypeList"></div>
        </div>
      </div>
    </section>
    <div class="bottom">
      <section class="section"><p class="eyebrow">BASEMAP</p><div class="base"><button class="on" data-base="streets">Streets</button><button data-base="aerial">Aerial</button><button data-base="topo">Topo</button></div></section>
      <div class="footer"><span id="services"><i class="dot"></i>Services ready</span><span>Live public data</span></div>
    </div>
  </aside>
  <main>
    <div id="map"></div>
    <div class="status"><i class="dot"></i><div><b id="visible">0 visible features</b><small id="view">Kentucky overview</small></div></div>
    <section class="panel" id="panel" hidden><button class="close" id="close">×</button><p class="eyebrow" id="kicker">FEATURE DETAILS</p><h2 id="featureTitle"></h2><div id="tags"></div><dl id="fields"></dl></section><section class="radius-results" id="radiusResults" hidden><header><div><p class="eyebrow">RADIUS RESULTS</p><h3 id="radiusTitle">Found records</h3><small id="radiusMeta"></small></div><button class="close" id="radiusClose" aria-label="Close radius results">×</button></header><div id="radiusList"></div></section>
  </main>
</div>
